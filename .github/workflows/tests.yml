name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  pytest:
    # The project depends on Windows-only modules (pygetwindow). The tests
    # themselves don't touch the screen, but importing minigames.hoops.main
    # transitively imports the window-lookup module, which doesn't install
    # cleanly on Linux. Running on windows-latest keeps the test environment
    # the same as where the bot itself runs.
    runs-on: windows-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync

      - name: Run pytest
        run: uv run pytest tests/ -v
